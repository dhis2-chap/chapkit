name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v7
    
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "latest"
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"
    
    - name: Install dependencies (including optional extras)
      run: uv sync --all-extras --group dev

    - name: Run linting
      run: make lint

    - name: Run tests with coverage
      run: make coverage

    - name: Run slow CLI scaffolding tests
      run: make test-slow

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v7
      with:
        token: ${{ secrets.CODECOV_TOKEN }}

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
    - uses: actions/checkout@v7

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 11

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: pnpm
        cache-dependency-path: frontend/pnpm-lock.yaml

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Typecheck
      run: pnpm exec tsc -b --noEmit

    - name: Lint
      run: pnpm lint

    - name: Build console
      run: pnpm build

    - name: Verify committed console bundle is up to date
      run: |
        if ! git diff --quiet -- ../src/chapkit/api/apps/console; then
          echo "::error::Committed console bundle (src/chapkit/api/apps/console) is stale - run 'pnpm build' in frontend/ and commit the result."
          git diff --stat -- ../src/chapkit/api/apps/console
          exit 1
        fi

  e2e:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "latest"

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"

    - name: Install Python dependencies
      run: uv sync --all-extras --group dev

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 11

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: pnpm
        cache-dependency-path: frontend/pnpm-lock.yaml

    - name: Install frontend dependencies
      working-directory: frontend
      run: pnpm install --frozen-lockfile

    - name: Build console
      working-directory: frontend
      run: pnpm build

    - name: Install Playwright browser
      working-directory: frontend
      run: pnpm exec playwright install --with-deps chromium

    - name: Run console e2e (boots the fixture chapkit service)
      working-directory: frontend
      run: pnpm exec playwright test

    - name: Upload Playwright report
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 7
